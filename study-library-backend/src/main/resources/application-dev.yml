spring:
  datasource:
    url: ${DEV_DB_URL:jdbc:h2:mem:studylib;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${DEV_DB_DRIVER:org.h2.Driver}
    username: ${DEV_DB_USERNAME:sa}
    password: ${DEV_DB_PASSWORD:}
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: ${DEV_SQL_INIT_MODE:always}
      schema-locations: optional:file:./sql/init/001_init_schema.sql
      data-locations: optional:file:./sql/init/002_seed_demo_data.sql

logging:
  level:
    com.studylib: info

app:
  env: dev
  cors:
    allowed-origin-patterns:
      - http://localhost:*
      - http://127.0.0.1:*
      - http://192.168.*:*
      - http://10.*:*
      - http://172.*:*
  jwt:
    secret: study-library-backend-dev-jwt-secret-key-2026-secure
