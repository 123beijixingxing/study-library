          application/json:
            schema:
              $ref: '#/components/schemas/PracticeSubmitRequestDTO'
      responses:
        '200':
          description: Submit result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PracticeSubmitResponseEnvelope'
  /api/app/v1/search:
    get:
      tags: [app-course]
      summary: Search courses, categories, or contents
      parameters:
        - $ref: '#/components/parameters/Keyword'
        - name: searchType
          in: query
          required: true
          schema:
            type: string
            enum: [course, category, content]
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Search result page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResultPageEnvelope'
  /api/app/v1/search/hot-keywords:
    get:
      tags: [app-course]
      summary: Get hot search keywords
      parameters:
        - name: scene
          in: query
          schema:
            type: string
