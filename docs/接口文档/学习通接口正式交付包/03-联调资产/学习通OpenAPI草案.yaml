openapi: 3.0.3
info:
  title: 学习通 API Draft
  version: 1.1.0
  description: >-
    Draft OpenAPI specification generated from the Study Library requirement,
    interface, DTO, and status-flow documents.
servers:
  - url: /
    description: Unified API root; paths already include full `/api/app/v1` or `/api/admin/v1` prefixes
tags:
  - name: app-auth
  - name: app-course
  - name: app-practice
  - name: app-message
  - name: admin-auth
  - name: admin-course
  - name: admin-message
  - name: admin-report
  - name: admin-config
  - name: admin-statistics
paths:
  /api/app/v1/auth/login:
    post:
      tags: [app-auth]
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppLoginRequestDTO'
      responses:
        '200':
          description: Login response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppLoginResponseEnvelope'
  /api/app/v1/auth/register:
    post:
      tags: [app-auth]
      summary: User register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppRegisterRequestDTO'
      responses:
        '200':
          description: Register response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponseEnvelope'
  /api/app/v1/auth/password/code:
    post:
      tags: [app-auth]
      summary: Send password reset code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordCodeRequestDTO'
      responses:
        '200':
          description: Code sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpireSecondsEnvelope'
  /api/app/v1/auth/password/verify:
    post:
      tags: [app-auth]
      summary: Verify password reset code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emailOrPhone, code]
              properties:
                emailOrPhone:
                  type: string
                code:
                  type: string
      responses:
        '200':
          description: Verify token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          verifyToken:
                            type: string
  /api/app/v1/auth/password/reset:
    post:
      tags: [app-auth]
      summary: Reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [verifyToken, newPassword, confirmPassword]
              properties:
                verifyToken:
                  type: string
                newPassword:
                  type: string
                confirmPassword:
                  type: string
      responses:
        '200':
          description: Reset result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleSuccessEnvelope'
  /api/app/v1/auth/me:
    get:
      tags: [app-auth]
      summary: Get current user info
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AppUserInfo'
  /api/app/v1/auth/logout:
    post:
      tags: [app-auth]
      summary: Logout current user
      responses:
        '200':
          description: Logout result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleSuccessEnvelope'
  /api/app/v1/home/hot-contents:
    get:
      tags: [app-course]
      summary: Get home hot contents
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        '200':
          description: Hot content list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotContentListEnvelope'
  /api/app/v1/home/courses:
    get:
      tags: [app-course]
      summary: Get home courses by section
      parameters:
        - name: sectionType
          in: query
          required: true
          schema:
            type: string
            enum: [recommend, hot, latest]
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Home course page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeCoursePageEnvelope'
  /api/app/v1/home/categories:
    get:
      tags: [app-course]
      summary: Get home categories
      parameters:
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Home category page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeCategoryPageEnvelope'
  /api/app/v1/courses/{courseId}:
    get:
      tags: [app-course]
      summary: Get course detail
      parameters:
        - $ref: '#/components/parameters/CourseId'
      responses:
        '200':
          description: Course detail
          content:
            application/json:
              schema:
