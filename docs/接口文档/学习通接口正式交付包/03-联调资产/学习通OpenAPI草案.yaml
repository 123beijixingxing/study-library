components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    CourseId:
      name: courseId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    PaperId:
      name: paperId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    MessageId:
      name: messageId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ContentId:
      name: contentId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ReportId:
      name: reportId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    PageNum:
      name: pageNum
      in: query
      schema:
        type: integer
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 10
    Keyword:
      name: keyword
      in: query
      schema:
        type: string
    Status:
      name: status
      in: query
      schema:
        type: string
  schemas:
    BaseEnvelope:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        requestId:
          type: string
        timestamp:
          type: integer
          format: int64
    IdResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
    AppLoginRequestDTO:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          maxLength: 30
        password:
          type: string
          maxLength: 18
        rememberMe:
          type: boolean
    AppRegisterRequestDTO:
      type: object
      required: [username, password, confirmPassword, email, phone]
      properties:
        username:
          type: string
        password:
          type: string
        confirmPassword:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
    PasswordCodeRequestDTO:
      type: object
      required: [accountType, emailOrPhone]
      properties:
        accountType:
          type: string
          enum: [email, phone]
        emailOrPhone:
          type: string
    AppUserInfo:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        username:
          type: string
        avatar:
          type: string
        memberStatus:
          type: string
          enum: [active, expiring, expired, cancelled]
        roleList:
          type: array
          items:
            type: string
    MemberInfoSummary:
      type: object
      properties:
        memberStatus:
          type: string
          enum: [active, expiring, expired, cancelled]
        memberLevel:
          type: string
        expireTime:
          type: string
    RewardInfo:
      type: object
      properties:
        rewardType:
          type: string
        rewardValue:
          type: integer
        rewardName:
          type: string
    SourceInfo:
      type: object
      properties:
        sourceId:
          type: integer
          format: int64
        sourceName:
          type: string
        sourceLogoUrl:
          type: string
        sourceDesc:
          type: string
    ScoreDistributionItem:
      type: object
      properties:
        bucket:
          type: string
        count:
          type: integer
        rate:
          type: number
    AppLoginResponse:
      type: object
      properties:
        token:
          type: string
        refreshToken:
          type: string
        userInfo:
          $ref: '#/components/schemas/AppUserInfo'
    CourseEvaluationCreateRequestDTO:
      type: object
      required: [score]
      properties:
        score:
          type: integer
          minimum: 1
          maximum: 5
        content:
          type: string
          maxLength: 1000
    CourseChapter:
      type: object
      properties:
        chapterId:
          type: integer
          format: int64
        chapterTitle:
          type: string
        chapterType:
          type: string
          enum: [text, video, audio, file]
        sortNo:
          type: integer
        durationSeconds:
          type: integer
        learned:
          type: boolean
    CourseDetailResponse:
      type: object
      properties:
        courseId:
          type: integer
          format: int64
        courseName:
          type: string
        teacherName:
          type: string
        summary:
          type: string
        coverUrl:
          type: string
        tagList:
          type: array
          items:
            type: string
        averageScore:
          type: number
        evaluationCount:
          type: integer
        progressPercent:
          type: number
        chapterList:
          type: array
          items:
            $ref: '#/components/schemas/CourseChapter'
    QuestionOption:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
    PracticeQuestion:
      type: object
      properties:
        questionId:
          type: integer
          format: int64
        questionType:
          type: string
          enum: [single_choice, multi_choice, judge]
        questionTitle:
          type: string
        optionList:
          type: array
          items:
            $ref: '#/components/schemas/QuestionOption'
        knowledgeTagList:
          type: array
          items:
            type: string
        answerAnalysis:
          type: string
    PracticePaperDetailResponse:
      type: object
      properties:
        paperId:
          type: integer
          format: int64
        paperName:
          type: string
        paperType:
          type: string
          enum: [chapter, special, mock]
        totalScore:
          type: number
        questionList:
          type: array
          items:
            $ref: '#/components/schemas/PracticeQuestion'
    PracticeAnswerItemDTO:
      type: object
      required: [questionId, userAnswer]
      properties:
        questionId:
          type: integer
          format: int64
        userAnswer:
          type: string
    PracticeSubmitRequestDTO:
      type: object
      required: [questionAnswerList, costSeconds]
      properties:
        questionAnswerList:
          type: array
          items:
            $ref: '#/components/schemas/PracticeAnswerItemDTO'
        costSeconds:
          type: integer
          minimum: 0
    PracticeSubmitResponse:
      type: object
      properties:
        recordId:
          type: integer
          format: int64
        score:
          type: number
        correctCount:
          type: integer
        wrongCount:
          type: integer
    AdminLoginRequestDTO:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
    AdminInfo:
      type: object
      properties:
        adminId:
          type: integer
          format: int64
        username:
          type: string
        roleList:
          type: array
          items:
            type: string
    AdminLoginResponse:
      type: object
      properties:
        token:
          type: string
        adminInfo:
          $ref: '#/components/schemas/AdminInfo'
    AdminCourseCreateRequestDTO:
      type: object
      required: [courseName, categoryId]
      properties:
        courseName:
          type: string
        summary:
          type: string
        coverUrl:
          type: string
        categoryId:
          type: integer
          format: int64
        hotScore:
          type: integer
    AdminCourseItem:
      type: object
      properties:
        courseId:
          type: integer
          format: int64
        courseName:
          type: string
        categoryName:
          type: string
        status:
          type: string
          enum: [draft, pending, published, offline]
    AdminMessageCreateRequestDTO:
      type: object
      required: [title, messageType, content, receiverType]
      properties:
        title:
          type: string
        messageType:
          type: string
          enum: [system, activity, service]
        content:
          type: string
        receiverType:
          type: string
          enum: [all, role, user]
        receiverIds:
          type: array
          items:
            type: integer
            format: int64
    ReportHandleRequestDTO:
      type: object
      required: [handleResult]
      properties:
        handleResult:
          type: string
        handleRemark:
          type: string
    ReportHandleResponse:
      type: object
      properties:
        status:
          type: string
          enum: [pending, processing, resolved, rejected]
        handledAt:
          type: string
    RecommendSlotSaveRequestDTO:
      type: object
      required: [slotName, pageCode, resourceType]
      properties:
        slotName:
          type: string
        pageCode:
          type: string
        resourceType:
          type: string
          enum: [course, category, content, link]
        targetId:
          type: integer
          format: int64
        sortNo:
          type: integer
    RecommendSlotItem:
