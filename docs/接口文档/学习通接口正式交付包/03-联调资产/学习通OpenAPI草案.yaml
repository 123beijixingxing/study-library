  /api/app/v1/courses/{courseId}/evaluations:
    get:
      tags: [app-course]
      summary: Get course evaluations
      parameters:
        - $ref: '#/components/parameters/CourseId'
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Evaluation page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseEvaluationPageEnvelope'
    post:
      tags: [app-course]
      summary: Create course evaluation
      parameters:
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseEvaluationCreateRequestDTO'
      responses:
        '200':
          description: Evaluation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationCreateResponseEnvelope'
  /api/app/v1/courses/{courseId}/chapters:
    get:
      tags: [app-course]
      summary: Get course chapter list
      parameters:
        - $ref: '#/components/parameters/CourseId'
      responses:
        '200':
          description: Chapter list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseChapterListEnvelope'
  /api/app/v1/courses/{courseId}/progress:
    post:
      tags: [app-course]
      summary: Submit study progress
      parameters:
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudyProgressRequestDTO'
      responses:
        '200':
          description: Study progress result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyProgressEnvelope'
  /api/app/v1/practice/papers:
    get:
      tags: [app-practice]
      summary: Get practice paper list
      parameters:
        - name: scene
          in: query
          schema:
            type: string
        - name: courseId
          in: query
          schema:
            type: integer
            format: int64
        - name: chapterId
          in: query
          schema:
            type: integer
            format: int64
        - name: paperType
          in: query
          schema:
            type: string
            enum: [chapter, special, mock]
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Practice paper page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PracticePaperPageEnvelope'
  /api/app/v1/practice/entries:
    get:
      tags: [app-practice]
      summary: Get practice entry list
      parameters:
        - name: scene
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Practice entry list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PracticeEntryListEnvelope'
  /api/app/v1/practice/papers/{paperId}:
    get:
      tags: [app-practice]
      summary: Get practice paper detail
      parameters:
        - $ref: '#/components/parameters/PaperId'
      responses:
        '200':
          description: Practice paper detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PracticePaperDetailEnvelope'
  /api/app/v1/practice/papers/{paperId}/submit:
    post:
      tags: [app-practice]
      summary: Submit practice answers
      parameters:
        - $ref: '#/components/parameters/PaperId'
      requestBody:
        required: true
