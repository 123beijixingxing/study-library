<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习通 - 学习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; }
        
        .header { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: white; display: flex; align-items: center; padding: 0 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 100; }
        .header-left { flex: 8; }
        .header-right { flex: 2; display: flex; justify-content: flex-end; }
        .search-box { display: flex; gap: 8px; }
        .search-input { flex: 1; padding: 8px 16px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        .icon-btn { width: 36px; height: 36px; border-radius: 50%; background: #f0f0f0; border: none; cursor: pointer; font-size: 16px; }
        
        .main { padding: 80px 20px 80px; }
        
        .category-section { margin-bottom: 20px; }
        .category-header { background: white; padding: 16px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .category-name { font-size: 16px; font-weight: 600; color: #333; }
        .category-arrow { transition: transform 0.3s; }
        .category-header.active .category-arrow { transform: rotate(180deg); }
        
        .sub-categories { display: none; padding: 12px; background: white; border-radius: 12px; }
        .sub-categories.active { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .sub-card { padding: 16px; background: #f8f8f8; border-radius: 8px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .sub-card:hover { background: #667eea; color: white; }
        .sub-card-name { font-size: 14px; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: white; display: flex; align-items: center; justify-content: space-around; box-shadow: 0 -2px 8px rgba(0,0,0,0.1); }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; color: #999; font-size: 12px; }
        .nav-item.active { color: #667eea; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .modal-btn { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 8px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="search-box">
                <input type="text" class="search-input" placeholder="搜索课程...">
                <button class="icon-btn" onclick="doSearch()">🔍</button>
            </div>
        </div>
        <div class="header-right">
            <button class="icon-btn" onclick="showPractice()" title="练习">📝</button>
        </div>
    </header>

    <main class="main">
        <div class="category-section">
            <div class="category-header active" onclick="toggleCategory(this)">
                <span class="category-name">编程开发</span>
                <span class="category-arrow">▼</span>
            </div>
            <div class="sub-categories active">
                <div class="sub-card"><div class="sub-card-name">Python</div></div>
                <div class="sub-card"><div class="sub-card-name">Java</div></div>
                <div class="sub-card"><div class="sub-card-name">JavaScript</div></div>
                <div class="sub-card"><div class="sub-card-name">C++</div></div>
                <div class="sub-card"><div class="sub-card-name">Go</div></div>
                <div class="sub-card"><div class="sub-card-name">Rust</div></div>
                <div class="sub-card"><div class="sub-card-name">PHP</div></div>
                <div class="sub-card"><div class="sub-card-name">Ruby</div></div>
            </div>
        </div>

        <div class="category-section">
            <div class="category-header" onclick="toggleCategory(this)">
                <span class="category-name">数据科学</span>
                <span class="category-arrow">▼</span>
            </div>
            <div class="sub-categories">
                <div class="sub-card"><div class="sub-card-name">数据分析</div></div>
                <div class="sub-card"><div class="sub-card-name">机器学习</div></div>
                <div class="sub-card"><div class="sub-card-name">深度学习</div></div>
                <div class="sub-card"><div class="sub-card-name">人工智能</div></div>
                <div class="sub-card"><div class="sub-card-name">大数据</div></div>
                <div class="sub-card"><div class="sub-card-name">数据可视化</div></div>
                <div class="sub-card"><div class="sub-card-name">统计学</div></div>
                <div class="sub-card"><div class="sub-card-name">算法</div></div>
            </div>
        </div>

        <div class="category-section">
            <div class="category-header" onclick="toggleCategory(this)">
                <span class="category-name">前端开发</span>
                <span class="category-arrow">▼</span>
            </div>
            <div class="sub-categories">
                <div class="sub-card"><div class="sub-card-name">HTML</div></div>
                <div class="sub-card"><div class="sub-card-name">CSS</div></div>
                <div class="sub-card"><div class="sub-card-name">Vue</div></div>
                <div class="sub-card"><div class="sub-card-name">React</div></div>
                <div class="sub-card"><div class="sub-card-name">Angular</div></div>
                <div class="sub-card"><div class="sub-card-name">小程序</div></div>
                <div class="sub-card"><div class="sub-card-name">TypeScript</div></div>
                <div class="sub-card"><div class="sub-card-name">Node.js</div></div>
            </div>
        </div>

        <div class="category-section">
            <div class="category-header" onclick="toggleCategory(this)">
                <span class="category-name">移动开发</span>
                <span class="category-arrow">▼</span>
            </div>
            <div class="sub-categories">
                <div class="sub-card"><div class="sub-card-name">Android</div></div>
                <div class="sub-card"><div class="sub-card-name">iOS</div></div>
                <div class="sub-card"><div class="sub-card-name">Flutter</div></div>
                <div class="sub-card"><div class="sub-card-name">React Native</div></div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="location.href='home.html'">
            <span class="icon">🏠</span>
            <span>首页</span>
        </div>
        <div class="nav-item active" onclick="location.href='study.html'">
            <span class="icon">📚</span>
            <span>学习</span>
        </div>
        <div class="nav-item" onclick="location.href='garden.html'">
            <span class="icon">🌳</span>
            <span>园地</span>
        </div>
        <div class="nav-item" onclick="location.href='profile.html'">
            <span class="icon">👤</span>
            <span>我的</span>
        </div>
    </nav>

    <div class="modal" id="practice-modal">
        <div class="modal-content">
            <div class="modal-title">开始练习</div>
            <p style="margin-bottom: 16px; color: #666;">选择练习科目</p>
            <button class="modal-btn">Python练习</button>
            <button class="modal-btn" style="background: #52c41a; margin-top: 8px;">Java练习</button>
            <button class="modal-btn" style="background: #999; margin-top: 8px;" onclick="closeModal()">取消</button>
        </div>
    </div>

    <script>
        function toggleCategory(header) {
            header.classList.toggle('active');
            header.nextElementSibling.classList.toggle('active');
        }
        function showPractice() { document.getElementById('practice-modal').classList.add('active'); }
        function closeModal() { document.getElementById('practice-modal').classList.remove('active'); }
        function doSearch() { alert('搜索课程分类'); }
    </script>
</body>
</html>
