<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习通 - 我的</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; }
        
        .header { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: white; display: flex; align-items: center; padding: 0 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 100; justify-content: space-between; }
        .header-left { flex: 2; }
        .header-right { flex: 8; display: flex; justify-content: flex-end; gap: 16px; }
        .icon-btn { width: 36px; height: 36px; border-radius: 50%; background: #f0f0f0; border: none; cursor: pointer; font-size: 16px; }
        
        .main { padding: 80px 20px 80px; }
        
        .profile-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 30px 20px; border-radius: 16px; margin-bottom: 20px; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; background: white; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 32px; }
        .username { text-align: center; color: white; font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .user-desc { text-align: center; color: rgba(255,255,255,0.8); font-size: 14px; }
        
        .vip-banner { background: linear-gradient(135deg, #ffd700, #ff8c00); padding: 16px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .vip-title { color: white; font-weight: 600; }
        .vip-btn { padding: 6px 16px; background: white; color: #ff8c00; border-radius: 16px; font-size: 12px; border: none; cursor: pointer; }
        
        .menu-section { background: white; border-radius: 12px; margin-bottom: 20px; }
        .menu-title { padding: 16px; font-size: 14px; color: #999; border-bottom: 1px solid #f0f0f0; }
        .menu-list { padding: 8px 0; }
        .menu-item { display: flex; align-items: center; padding: 16px; cursor: pointer; transition: background 0.3s; }
        .menu-item:hover { background: #f8f8f8; }
        .menu-icon { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; margin-right: 12px; font-size: 18px; }
        .menu-text { flex: 1; font-size: 15px; color: #333; }
        .menu-arrow { color: #ccc; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: white; display: flex; align-items: center; justify-content: space-around; box-shadow: 0 -2px 8px rgba(0,0,0,0.1); }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; color: #999; font-size: 12px; }
        .nav-item.active { color: #667eea; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 16px; padding: 24px; width: 80%; max-width: 300px; text-align: center; }
        .modal-icon { font-size: 64px; margin-bottom: 16px; }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .modal-text { color: #666; margin-bottom: 16px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left"></div>
        <div class="header-right">
            <button class="icon-btn" onclick="showScan()" title="扫一扫">📷</button>
            <button class="icon-btn" onclick="showSystemInfo()" title="系统信息">⚙️</button>
        </div>
    </header>

    <main class="main">
        <div class="profile-header">
            <div class="avatar">👤</div>
            <div class="username">学习用户</div>
            <div class="user-desc">VIP会员</div>
        </div>

        <div class="vip-banner" onclick="showVip()">
            <span class="vip-title">开通VIP会员 · 享更多权益</span>
            <button class="vip-btn">立即开通</button>
        </div>

        <div class="menu-section">
            <div class="menu-title">常用功能</div>
            <div class="menu-list">
                <div class="menu-item" onclick="showPage('member')">
                    <div class="menu-icon" style="background: linear-gradient(135deg, #ffd700, #ff8c00);">👑</div>
                    <span class="menu-text">会员中心</span>
                    <span class="menu-arrow">›</span>
                </div>
                <div class="menu-item" onclick="showPage('info')">
                    <div class="menu-icon" style="background: linear-gradient(135deg, #667eea, #764ba2);">👤</div>
                    <span class="menu-text">个人信息</span>
                    <span class="menu-arrow">›</span>
                </div>
                <div class="menu-item" onclick="showPage('download')">
                    <div class="menu-icon" style="background: linear-gradient(135deg, #52c41a, #1890ff);">📥</div>
                    <span class="menu-text">离线下载</span>
                    <span class="menu-arrow">›</span>
                </div>
                <div class="menu-item" onclick="showPage('record')">
                    <div class="menu-icon" style="background: linear-gradient(135deg, #f5222d, #faad14);">📖</div>
                    <span class="menu-text">学习记录</span>
                    <span class="menu-arrow">›</span>
                </div>
            </div>
        </div>

        <div class="menu-section">
            <div class="menu-title">我的收藏</div>
            <div class="menu-list">
                <div class="menu-item" onclick="showPage('collect')">
                    <div class="menu-icon" style="background: linear-gradient(135deg, #ff6b6b, #ffa500);">⭐</div>
                    <span class="menu-text">我的收藏</span>
                    <span class="menu-arrow">›</span>
                </div>
                <div class="menu-item" onclick="showPage('message')">
                    <div class="menu-icon" style="background: linear-gradient(135deg, #1890ff, #52c41a);">💬</div>
                    <span class="menu-text">我的消息</span>
                    <span class="menu-arrow">›</span>
                </div>
                <div class="menu-item" onclick="showPage('service')">
                    <div class="menu-icon" style="background: linear-gradient(135deg, #722ed1, #eb2f96);">🎧</div>
                    <span class="menu-text">在线客服</span>
                    <span class="menu-arrow">›</span>
                </div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="location.href='home.html'">
            <span class="icon">🏠</span>
            <span>首页</span>
        </div>
        <div class="nav-item" onclick="location.href='study.html'">
            <span class="icon">📚</span>
            <span>学习</span>
        </div>
        <div class="nav-item" onclick="location.href='garden.html'">
            <span class="icon">🌳</span>
            <span>园地</span>
        </div>
        <div class="nav-item active" onclick="location.href='profile.html'">
            <span class="icon">👤</span>
            <span>我的</span>
        </div>
    </nav>

    <div class="modal" id="scan-modal">
        <div class="modal-content">
            <div class="modal-icon">📷</div>
            <div class="modal-title">扫一扫</div>
            <div class="modal-text">扫描二维码或条形码</div>
            <button style="padding: 12px 24px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer;" onclick="closeModal('scan-modal')">关闭</button>
        </div>
    </div>

    <div class="modal" id="system-modal">
        <div class="modal-content">
            <div class="modal-icon">⚙️</div>
            <div class="modal-title">系统信息</div>
            <div class="modal-text">学习通 v1.0.0</div>
            <button style="padding: 12px 24px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer;" onclick="closeModal('system-modal')">关闭</button>
        </div>
    </div>

    <div class="modal" id="vip-modal">
        <div class="modal-content">
            <div class="modal-icon">👑</div>
            <div class="modal-title">VIP会员</div>
            <div class="modal-text">开通VIP享专属特权</div>
            <button style="padding: 12px 24px; background: linear-gradient(135deg, #ffd700, #ff8c00); color: white; border: none; border-radius: 8px; cursor: pointer;" onclick="closeModal('vip-modal')">暂不开通</button>
        </div>
    </div>

    <script>
        function showScan() { document.getElementById('scan-modal').classList.add('active'); }
        function showSystemInfo() { document.getElementById('system-modal').classList.add('active'); }
        function showVip() { document.getElementById('vip-modal').classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function showPage(page) { alert('跳转到' + page + '页面'); }
    </script>
</body>
</html>
