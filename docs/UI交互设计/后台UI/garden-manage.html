<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>学习通后台 - 园地管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background: #001529; color: white; position: fixed; height: 100vh; }
        .logo { height: 64px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; }
        .logo span { color: #00d9ff; }
        .menu-item { padding: 14px 24px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #ffffff80; }
        .menu-item:hover, .menu-item.active { background: #ffffff10; color: white; }
        .menu-item.active { border-left: 3px solid #00d9ff; }
        .main { flex: 1; margin-left: 240px; }
        .header { height: 64px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
        .content { padding: 24px; }
        .tabs { display: flex; gap: 0; background: white; border-radius: 12px 12px 0 0; overflow: hidden; }
        .tab { padding: 14px 24px; cursor: pointer; background: #f0f0f0; border: none; }
        .tab.active { background: white; color: #00d9ff; border-top: 3px solid #00d9ff; }
        .toolbar { background: white; padding: 16px; border-radius: 0 12px 12px 12px; margin-bottom: 16px; }
        .btn { padding: 8px 20px; border-radius: 8px; cursor: pointer; border: none; }
        .btn-primary { background: #00d9ff; color: white; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .card-title { font-weight: 600; }
        .action-btn { padding: 4px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin-left: 4px; }
        .action-btn.pass { background: #f6ffed; color: #52c41a; }
        .action-btn.reject { background: #fff1f0; color: #f5222d; }
        .action-btn.edit { background: #fff7e6; color: #fa8c16; }
        .action-btn.delete { background: #fff1f0; color: #f5222d; }
        .content-text { color: #666; margin: 12px 0; }
        .card-footer { display: flex; justify-content: space-between; color: #999; font-size: 13px; }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo"><span>学习通</span>后台</div>
            <nav class="menu">
                <div class="menu-item" onclick="location.href='dashboard.html'">📊 仪表盘</div>
                <div class="menu-item" onclick="location.href='user.html'">👥 用户管理</div>
                <div class="menu-item" onclick="location.href='home-manage.html'">🏠 首页管理</div>
                <div class="menu-item" onclick="location.href='course.html'">📚 课程管理</div>
                <div class="menu-item active" onclick="location.href='garden-manage.html'">🌳 园地管理</div>
                <div class="menu-item" onclick="location.href='member.html'">👑 会员管理</div>
                <div class="menu-item" onclick="location.href='system.html'">⚙️ 系统管理</div>
                <div class="menu-item" onclick="location.href='statistics.html'">📈 数据统计</div>
                <div class="menu-item" onclick="location.href='logs.html'">📝 日志管理</div>
            </nav>
        </aside>
        <main class="main">
            <header class="header"><div class="header-title">园地管理</div></header>
            <div class="content">
                <div class="tabs">
                    <button class="tab active" onclick="switchTab(this, 'hot')">火热内容</button>
                    <button class="tab" onclick="switchTab(this, 'share')">分享内容</button>
                    <button class="tab" onclick="switchTab(this, 'collect')">收藏管理</button>
                </div>
                <div class="toolbar">
                    <button class="btn btn-primary">+ 发布内容</button>
                </div>
                <div id="content-area">
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">程序员之家</span>
                            <div><button class="action-btn pass">通过</button><button class="action-btn reject">拒绝</button><button class="action-btn edit">编辑</button><button class="action-btn delete">删除</button></div>
                        </div>
                        <div class="content-text">今天学习了Vue3的Composition API，真的太香了！响应式原理理解得更透彻了，推荐大家也试试~</div>
                        <div class="card-footer"><span>程序员小明 · 2小时前</span><span>❤️ 256 💬 42</span></div>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">技术前沿</span>
                            <div><button class="action-btn pass">通过</button><button class="action-btn reject">拒绝</button><button class="action-btn edit">编辑</button><button class="action-btn delete">删除</button></div>
                        </div>
                        <div class="content-text">2026年最火的AI框架原来是这些！深度学习入门必看，内含学习路线图~</div>
                        <div class="card-footer"><span>AI研究者 · 5小时前</span><span>❤️ 189 💬 31</span></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        function switchTab(btn, type) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            const area = document.getElementById('content-area');
            if (type === 'collect') {
                area.innerHTML = '<div class="card"><div class="card-header"><span class="card-title">用户收藏记录</span></div><div class="content-text">展示用户收藏列表...</div></div>';
            } else {
                area.innerHTML = '<div class="card"><div class="card-header"><span class="card-title">程序员之家</span><div><button class="action-btn pass">通过</button><button class="action-btn reject">拒绝</button><button class="action-btn edit">编辑</button><button class="action-btn delete">删除</button></div></div><div class="content-text">今天学习了Vue3的Composition API...</div><div class="card-footer"><span>程序员小明 · 2小时前</span><span>❤️ 256</span></div></div>';
            }
        }
    </script>
</body>
</html>
