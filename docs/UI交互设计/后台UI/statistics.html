<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>学习通后台 - 数据统计</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background: #001529; color: white; position: fixed; height: 100vh; }
        .logo { height: 64px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .logo span { color: #00d9ff; }
        .menu-item { padding: 14px 24px; cursor: pointer; color: #ffffff80; display: flex; align-items: center; gap: 12px; }
        .menu-item:hover, .menu-item.active { background: #ffffff10; color: white; }
        .menu-item.active { border-left: 3px solid #00d9ff; }
        .main { flex: 1; margin-left: 240px; }
        .header { height: 64px; background: white; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
        .content { padding: 24px; }
        .tabs { display: flex; gap: 16px; margin-bottom: 24px; }
        .tab { padding: 10px 20px; background: white; border: none; border-radius: 8px; cursor: pointer; }
        .tab.active { background: #00d9ff; color: white; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 24px; }
        .stat-card { background: white; border-radius: 12px; padding: 24px; }
        .stat-title { color: #666; font-size: 14px; margin-bottom: 8px; }
        .stat-value { font-size: 32px; font-weight: 600; }
        .chart-card { background: white; border-radius: 12px; padding: 24px; }
        .chart-title { font-weight: 600; margin-bottom: 16px; }
        .chart-placeholder { height: 300px; background: linear-gradient(135deg, #f0f2f5, #e6f7ff); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #999; }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo"><span>学习通</span>后台</div>
            <nav class="menu">
                <div class="menu-item" onclick="location.href='dashboard.html'">📊 仪表盘</div>
                <div class="menu-item" onclick="location.href='user.html'">👥 用户管理</div>
                <div class="menu-item" onclick="location.href='home-manage.html'">🏠 首页管理</div>
                <div class="menu-item" onclick="location.href='course.html'">📚 课程管理</div>
                <div class="menu-item" onclick="location.href='garden-manage.html'">🌳 园地管理</div>
                <div class="menu-item" onclick="location.href='member.html'">👑 会员管理</div>
                <div class="menu-item" onclick="location.href='system.html'">⚙️ 系统管理</div>
                <div class="menu-item active" onclick="location.href='statistics.html'">📈 数据统计</div>
                <div class="menu-item" onclick="location.href='logs.html'">📝 日志管理</div>
            </nav>
        </aside>
        <main class="main">
            <header class="header"><div class="header-title">数据统计</div></header>
            <div class="content">
                <div class="tabs">
                    <button class="tab active">用户统计</button>
                    <button class="tab">课程统计</button>
                    <button class="tab">活跃度统计</button>
                </div>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-title">用户总数</div><div class="stat-value">12,856</div></div>
                    <div class="stat-card"><div class="stat-title">今日新增</div><div class="stat-value">256</div></div>
                    <div class="stat-card"><div class="stat-title">活跃用户</div><div class="stat-value">3,456</div></div>
                    <div class="stat-card"><div class="stat-title">会员用户</div><div class="stat-value">2,156</div></div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">用户增长趋势</div>
                    <div class="chart-placeholder">📈 折线图区域</div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
