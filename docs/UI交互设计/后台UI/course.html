<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>学习通后台 - 课程管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background: #001529; color: white; position: fixed; height: 100vh; }
        .logo { height: 64px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; }
        .logo span { color: #00d9ff; }
        .menu-item { padding: 14px 24px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #ffffff80; }
        .menu-item:hover, .menu-item.active { background: #ffffff10; color: white; }
        .menu-item.active { border-left: 3px solid #00d9ff; }
        .main { flex: 1; margin-left: 240px; }
        .header { height: 64px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .content { padding: 24px; }
        .toolbar { background: white; padding: 16px; border-radius: 12px; margin-bottom: 16px; display: flex; gap: 12px; }
        .search-input { flex: 1; padding: 8px 16px; border: 1px solid #d9d9d9; border-radius: 8px; max-width: 300px; }
        .btn { padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; border: none; }
        .btn-primary { background: #00d9ff; color: white; }
        .table-card { background: white; border-radius: 12px; padding: 24px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #fafafa; font-weight: 600; }
        .action-btn { padding: 4px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin-right: 4px; }
        .action-btn.edit { background: #fff7e6; color: #fa8c16; }
        .action-btn.delete { background: #fff1f0; color: #f5222d; }
        .action-btn.status { background: #e6f7ff; color: #1890ff; }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo"><span>学习通</span>后台</div>
            <nav class="menu">
                <div class="menu-item" onclick="location.href='dashboard.html'">📊 仪表盘</div>
                <div class="menu-item" onclick="location.href='user.html'">👥 用户管理</div>
                <div class="menu-item" onclick="location.href='home-manage.html'">🏠 首页管理</div>
                <div class="menu-item active" onclick="location.href='course.html'">📚 课程管理</div>
                <div class="menu-item" onclick="location.href='garden-manage.html'">🌳 园地管理</div>
                <div class="menu-item" onclick="location.href='member.html'">👑 会员管理</div>
                <div class="menu-item" onclick="location.href='system.html'">⚙️ 系统管理</div>
                <div class="menu-item" onclick="location.href='statistics.html'">📈 数据统计</div>
                <div class="menu-item" onclick="location.href='logs.html'">📝 日志管理</div>
            </nav>
        </aside>
        <main class="main">
            <header class="header"><div class="header-title">课程管理</div></header>
            <div class="content">
                <div class="toolbar">
                    <input type="text" class="search-input" placeholder="搜索课程...">
                    <select style="padding: 8px; border: 1px solid #d9d9d9; border-radius: 8px;"><option>全部分类</option></select>
                    <button class="btn btn-primary">+ 添加课程</button>
                </div>
                <div class="table-card">
                    <table>
                        <thead><tr><th>ID</th><th>课程名称</th><th>分类</th><th>火热指数</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead>
                        <tbody>
                            <tr><td>1</td><td>Python基础入门</td><td>编程开发</td><td>98</td><td><span style="color:#52c41a">已上架</span></td><td>2026-01-15</td><td><button class="action-btn edit">编辑</button><button class="action-btn status">下架</button><button class="action-btn delete">删除</button></td></tr>
                            <tr><td>2</td><td>JavaWeb开发</td><td>编程开发</td><td>95</td><td><span style="color:#52c41a">已上架</span></td><td>2026-01-20</td><td><button class="action-btn edit">编辑</button><button class="action-btn status">下架</button><button class="action-btn delete">删除</button></td></tr>
                            <tr><td>3</td><td>数据结构与算法</td><td>编程开发</td><td>92</td><td><span style="color:#faad14">待审核</span></td><td>2026-02-01</td><td><button class="action-btn edit">编辑</button><button class="action-btn status">上架</button><button class="action-btn delete">删除</button></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
