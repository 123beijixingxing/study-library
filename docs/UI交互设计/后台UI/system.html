<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>学习通后台 - 系统管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background: #001529; color: white; position: fixed; height: 100vh; }
        .logo { height: 64px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .logo span { color: #00d9ff; }
        .menu-item { padding: 14px 24px; cursor: pointer; color: #ffffff80; display: flex; align-items: center; gap: 12px; }
        .menu-item:hover, .menu-item.active { background: #ffffff10; color: white; }
        .menu-item.active { border-left: 3px solid #00d9ff; }
        .main { flex: 1; margin-left: 240px; }
        .header { height: 64px; background: white; padding: 0 24px; display: flex; align-items: center; }
        .content { padding: 24px; }
        .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #d9d9d9; border-radius: 8px; }
        .switch-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #f0f0f0; }
        .switch-label { font-weight: 500; }
        .switch-desc { color: #999; font-size: 13px; margin-top: 4px; }
        .toggle { width: 44px; height: 22px; background: #ccc; border-radius: 22px; position: relative; cursor: pointer; transition: 0.3s; }
        .toggle.active { background: #00d9ff; }
        .toggle::after { content: ''; width: 18px; height: 18px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: 0.3s; }
        .toggle.active::after { left: 24px; }
        .btn { padding: 10px 24px; border-radius: 8px; cursor: pointer; border: none; background: #00d9ff; color: white; }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo"><span>学习通</span>后台</div>
            <nav class="menu">
                <div class="menu-item" onclick="location.href='dashboard.html'">📊 仪表盘</div>
                <div class="menu-item" onclick="location.href='user.html'">👥 用户管理</div>
                <div class="menu-item" onclick="location.href='home-manage.html'">🏠 首页管理</div>
                <div class="menu-item" onclick="location.href='course.html'">📚 课程管理</div>
                <div class="menu-item" onclick="location.href='garden-manage.html'">🌳 园地管理</div>
                <div class="menu-item" onclick="location.href='member.html'">👑 会员管理</div>
                <div class="menu-item active" onclick="location.href='system.html'">⚙️ 系统管理</div>
                <div class="menu-item" onclick="location.href='statistics.html'">📈 数据统计</div>
                <div class="menu-item" onclick="location.href='logs.html'">📝 日志管理</div>
            </nav>
        </aside>
        <main class="main">
            <header class="header"><div class="header-title">系统管理</div></header>
            <div class="content">
                <div class="card">
                    <div class="card-title">系统信息</div>
                    <div class="form-group"><label>系统名称</label><input type="text" value="学习通"></div>
                    <div class="form-group"><label>系统版本</label><input type="text" value="v1.0.0"></div>
                    <div class="form-group"><label>版权信息</label><input type="text" value="© 2026 学习通"></div>
                    <div class="form-group"><label>联系方式</label><input type="text" value="support@xuexitong.com"></div>
                    <button class="btn">保存修改</button>
                </div>
                <div class="card">
                    <div class="card-title">功能配置</div>
                    <div class="switch-item">
                        <div><div class="switch-label">扫一扫功能</div><div class="switch-desc">允许用户使用扫一扫功能</div></div>
                        <div class="toggle active" onclick="this.classList.toggle('active')"></div>
                    </div>
                    <div class="switch-item">
                        <div><div class="switch-label">离线下载功能</div><div class="switch-desc">允许用户下载课程离线学习</div></div>
                        <div class="toggle active" onclick="this.classList.toggle('active')"></div>
                    </div>
                    <div class="switch-item">
                        <div><div class="switch-label">会员注册</div><div class="switch-desc">允许新用户注册</div></div>
                        <div class="toggle active" onclick="this.classList.toggle('active')"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
