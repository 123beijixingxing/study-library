<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>学习通后台 - 会员管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background: #001529; color: white; position: fixed; height: 100vh; }
        .logo { height: 64px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .logo span { color: #00d9ff; }
        .menu-item { padding: 14px 24px; cursor: pointer; color: #ffffff80; display: flex; align-items: center; gap: 12px; }
        .menu-item:hover, .menu-item.active { background: #ffffff10; color: white; }
        .menu-item.active { border-left: 3px solid #00d9ff; }
        .main { flex: 1; margin-left: 240px; }
        .header { height: 64px; background: white; padding: 0 24px; display: flex; align-items: center; }
        .content { padding: 24px; }
        .toolbar { background: white; padding: 16px; border-radius: 12px; margin-bottom: 16px; display: flex; gap: 12px; }
        .search-input { padding: 8px 16px; border: 1px solid #d9d9d9; border-radius: 8px; width: 300px; }
        .btn { padding: 8px 20px; border-radius: 8px; cursor: pointer; border: none; }
        .btn-primary { background: #00d9ff; color: white; }
        .table-card { background: white; border-radius: 12px; padding: 24px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #fafafa; font-weight: 600; }
        .action-btn { padding: 4px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin-right: 4px; }
        .action-btn.view { background: #e6f7ff; color: #1890ff; }
        .action-btn.cancel { background: #fff1f0; color: #f5222d; }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo"><span>学习通</span>后台</div>
            <nav class="menu">
                <div class="menu-item" onclick="location.href='dashboard.html'">📊 仪表盘</div>
                <div class="menu-item" onclick="location.href='user.html'">👥 用户管理</div>
                <div class="menu-item" onclick="location.href='home-manage.html'">🏠 首页管理</div>
                <div class="menu-item" onclick="location.href='course.html'">📚 课程管理</div>
                <div class="menu-item" onclick="location.href='garden-manage.html'">🌳 园地管理</div>
                <div class="menu-item active" onclick="location.href='member.html'">👑 会员管理</div>
                <div class="menu-item" onclick="location.href='system.html'">⚙️ 系统管理</div>
                <div class="menu-item" onclick="location.href='statistics.html'">📈 数据统计</div>
                <div class="menu-item" onclick="location.href='logs.html'">📝 日志管理</div>
            </nav>
        </aside>
        <main class="main">
            <header class="header"><div class="header-title">会员管理</div></header>
            <div class="content">
                <div class="toolbar">
                    <input type="text" class="search-input" placeholder="搜索会员...">
                    <button class="btn btn-primary">发送消息</button>
                </div>
                <div class="table-card">
                    <table>
                        <thead><tr><th>ID</th><th>用户名</th><th>会员等级</th><th>开通时间</th><th>到期时间</th><th>状态</th><th>操作</th></tr></thead>
                        <tbody>
                            <tr><td>1</td><td>zhangsan</td><td>VIP年卡</td><td>2026-01-01</td><td>2027-01-01</td><td><span style="color:#52c41a">正常</span></td><td><button class="action-btn view">查看</button><button class="action-btn cancel">取消</button></td></tr>
                            <tr><td>2</td><td>lisi</td><td>VIP季卡</td><td>2026-02-01</td><td>2026-05-01</td><td><span style="color:#52c41a">正常</span></td><td><button class="action-btn view">查看</button><button class="action-btn cancel">取消</button></td></tr>
                            <tr><td>3</td><td>wangwu</td><td>VIP月卡</td><td>2026-03-01</td><td>2026-04-01</td><td><span style="color:#faad14">即将到期</span></td><td><button class="action-btn view">查看</button><button class="action-btn cancel">取消</button></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
